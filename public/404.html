<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // Convert path to hash-based URL for HashRouter
    var path = window.location.pathname;
    if (path !== '/' && path !== '/index.html') {
      window.location.href = '/#' + path + window.location.search;
    }
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
